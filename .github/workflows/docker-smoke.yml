name: docker-smoke

on:
  push:
    branches: [main]
  pull_request:

jobs:
  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t vbnet-stakeholder .
      - name: Registry smoke
        run: docker run --rm vbnet-stakeholder --list-values
      - name: JSON smoke
        run: docker run --rm vbnet-stakeholder --output-format json --focus-family code_analyzer --seed 123
      - name: Modern-core smoke
        run: docker run --rm vbnet-stakeholder --output-format json --focus-family platform_engineering --seed 456
      - name: Experimental provider fail-fast
        run: |
          if docker run --rm vbnet-stakeholder --experimental-provider local-demo; then
            echo "expected fail-fast"
            exit 1
          fi
